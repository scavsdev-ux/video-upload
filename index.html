<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload de Vídeo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --border-hover: #444;
    --text: #f0ede8;
    --muted: #888;
    --accent: #c8f264;
    --accent-dim: rgba(200, 242, 100, 0.08);
    --danger: #ff5c5c;
    --success: #4ade80;
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }

  h1 {
    font-size: 28px;
    font-weight: 300;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .drop-zone {
    border: 1px dashed var(--border-hover);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 1rem;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid rgba(200, 242, 100, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .drop-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .drop-label {
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 0.25rem;
  }

  .drop-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .file-info {
    display: none;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    word-break: break-all;
  }

  .file-info.visible { display: block; }

  .btn {
    width: 100%;
    margin-top: 1rem;
    padding: 0.9rem 1.5rem;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn:not(:disabled):hover { opacity: 0.9; }
  .btn:not(:disabled):active { transform: scale(0.98); }

  .progress-wrap {
    display: none;
    margin-top: 1rem;
  }

  .progress-wrap.visible { display: block; }

  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  .result {
    display: none;
    margin-top: 1.25rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    font-size: 13px;
  }

  .result.success {
    display: block;
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.2);
    color: var(--success);
  }

  .result.error {
    display: block;
    background: rgba(255, 92, 92, 0.08);
    border: 1px solid rgba(255, 92, 92, 0.2);
    color: var(--danger);
  }

  .result-title {
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .result-url {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    word-break: break-all;
    opacity: 0.8;
  }

  .result-url a {
    color: inherit;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Scavanni · Upload</div>
  <h1>Envie seu <span>vídeo</span></h1>
  <p class="subtitle">O arquivo será armazenado com segurança e processado automaticamente.</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <p class="drop-label">Arraste o arquivo aqui</p>
    <p class="drop-hint">ou clique para selecionar · vídeos e imagens</p>
  </div>

  <div class="file-info" id="fileInfo"></div>

  <button class="btn" id="uploadBtn" disabled>Enviar arquivo</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <p class="progress-label" id="progressLabel">Enviando...</p>
  </div>

  <div class="result" id="result">
    <p class="result-title" id="resultTitle"></p>
    <p class="result-url" id="resultUrl"></p>
  </div>
</div>

<script>
  const SHOPIFY_STORE = '1eb023-30.myshopify.com';
  const SHOPIFY_TOKEN = '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';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const result = document.getElementById('result');
  const resultTitle = document.getElementById('resultTitle');
  const resultUrl = document.getElementById('resultUrl');

  let selectedFile = null;

  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    fileInfo.textContent = `${file.name} · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
    fileInfo.classList.add('visible');
    uploadBtn.disabled = false;
    result.className = 'result';
  }

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    progressWrap.classList.add('visible');
    progressFill.style.width = '0%';
    progressLabel.textContent = 'Preparando...';
    result.className = 'result';

    try {
      const base64 = await toBase64(selectedFile);
      progressFill.style.width = '30%';
      progressLabel.textContent = 'Enviando para Shopify...';

      const attachment = base64.split(',')[1];
      const filename = selectedFile.name;
      const mimeType = selectedFile.type;

      const body = JSON.stringify({
        filename: filename,
        attachment: attachment,
        contentType: mimeType
      });

      const response = await fetch(`https://dry-math-3d6c.scavsdev.workers.dev`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Shopify-Store': SHOPIFY_STORE,
          'X-Shopify-Token': SHOPIFY_TOKEN
        },
        body: body
      });

      progressFill.style.width = '90%';

      if (!response.ok) {
        throw new Error(`Erro ${response.status}: ${await response.text()}`);
      }

      const data = await response.json();
      progressFill.style.width = '100%';
      progressLabel.textContent = 'Concluído!';

      const files = data?.data?.fileCreate?.files;
      const fileUrl = files?.[0]?.url || files?.[0]?.image?.url || files?.[0]?.sources?.[0]?.url || 'URL não disponível';
      const userErrors = data?.data?.fileCreate?.userErrors;
      if (userErrors?.length) throw new Error(userErrors[0].message);

      result.className = 'result success';
      resultTitle.textContent = '✓ Arquivo enviado com sucesso';
      resultUrl.innerHTML = `<a href="${fileUrl}" target="_blank">${fileUrl}</a>`;

    } catch (err) {
      progressFill.style.width = '100%';
      result.className = 'result error';
      resultTitle.textContent = '✗ Erro ao enviar';
      resultUrl.textContent = err.message;
    } finally {
      uploadBtn.disabled = false;
    }
  });

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
